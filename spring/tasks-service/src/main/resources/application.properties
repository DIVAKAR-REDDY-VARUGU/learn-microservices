# tasks-service config — H2 in-memory DB + JPA + logging (≈ Nest ConfigModule + TypeORM config)
spring.application.name=tasks-service
server.port=8080

# [DB] H2 in-memory database (data is wiped on restart) — use this JDBC url in the H2 console
spring.datasource.url=jdbc:h2:mem:tasksdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# [JPA] auto-create/update tables from @Entity classes; print the generated SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# [H2 console] open http://localhost:8080/h2-console  (JDBC url: jdbc:h2:mem:tasksdb, user: sa, no password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# [Logging] DEBUG for our code + SQL so you SEE the [STEP n] flow in the console
logging.level.com.learn.tasks=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# [Logging] show the per-request correlationId (set by the filter) on every line
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{correlationId:-startup}] %logger{0} - %msg%n
